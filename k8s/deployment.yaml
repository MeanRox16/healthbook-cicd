apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthbook-deployment
  namespace: healthbook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthbook
  template:
    metadata:
      labels:
        app: healthbook
    spec:
      containers:
      - name: healthbook
        image: meanrox16/healthbook:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

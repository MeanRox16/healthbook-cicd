version: "3.9"
services:
  healthbook:
    image: ${DOCKERHUB_USERNAME:-yourusername}/healthbook:latest
    build: .                        
    container_name: healthbook_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - healthbook_data:/data       
    environment:
      DB_PATH: /data/healthbook.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
volumes:
  healthbook_data:
